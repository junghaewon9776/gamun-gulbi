<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>인쇄용 - 방역코스</title>
  <link rel="stylesheet" href="style.css?v=20260611b">
  <style>
    body { background: #fff; }
    .print-wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .print-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .print-toolbar select, .print-toolbar button, .print-toolbar input { padding: 6px 10px; }

    /* 크기 설정 */
    body.sz-s .print-content { font-size: 11px; }
    body.sz-s .team-header, body.sz-s .warn-box { font-size: 14px; }
    body.sz-s .team-table th, body.sz-s .team-table td { padding: 3px 5px; }
    body.sz-s .course-item { padding: 6px 8px; }

    body.sz-m .print-content { font-size: 13px; }
    body.sz-m .team-header { font-size: 16px; }
    body.sz-m .warn-box { font-size: 18px; }

    body.sz-l .print-content { font-size: 16px; }
    body.sz-l .team-header { font-size: 20px; }
    body.sz-l .warn-box { font-size: 22px; }
    body.sz-l .team-table th, body.sz-l .team-table td { padding: 8px 10px; }

    .teams-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .team-table { width: 100%; border-collapse: collapse; border: 2px solid #1f2937; }
    .team-table th, .team-table td { border: 1px solid #4b5563; padding: 6px 8px; }
    .team-header { background: #87ceeb; font-weight: 700; text-align: center; }
    .team-header.t2 { background: #fde68a; }
    .team-header.t3 { background: #fca5a5; }
    .team-header.t4 { background: #c4b5fd; }
    .team-header.t5 { background: #a7f3d0; }
    .role-cell { background: #f3f4f6; font-weight: 600; text-align: center; width: 60px; }
    .name-cell { font-weight: 600; }
    .phone-cell { white-space: nowrap; font-family: monospace; }

    .reserve-box { margin-top: 8px; padding: 8px; border: 2px solid #6b7280; background: #f9fafb; text-align: center; }
    .reserve-box b { color: #374151; }

    .warn-box { background: #fef3c7; border: 2px solid #d97706; padding: 10px; text-align: center; font-weight: 700; color: #b91c1c; margin: 12px 0; white-space: pre-wrap; }

    .course-list { margin-top: 14px; }
    .course-item { margin: 8px 0; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 4px; }
    .course-item .label { font-weight: 700; margin-bottom: 4px; }
    .course-item .anchors { line-height: 1.7; }

    .notes { margin-top: 16px; line-height: 1.7; color: #374151; }
    .notes p { margin: 2px 0; font-size: 12px; }

    .qr-row { display: flex; gap: 14px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
    .qr-cell { text-align: center; font-size: 12px; }
    .qr-cell img { display: block; margin: 0 auto 4px; }

    @media print {
      .no-print { display: none !important; }
      body { background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .print-wrap { padding: 8px; max-width: none; }
      .course-item { page-break-inside: avoid; }
      .qr-row { page-break-inside: avoid; }
    }

    /* 가로 인쇄 — 조 그리드 3열 (A4 가로 297mm) */
    body.orient-landscape .teams-grid {
      grid-template-columns: 1fr 1fr 1fr;
    }
    body.orient-landscape .print-wrap {
      max-width: none;
    }
    body.orient-landscape .team-table th,
    body.orient-landscape .team-table td {
      padding: 3px 5px;
      font-size: 11px;
    }

    /* 호차 인쇄 모드 */
    body.mode-hocha .print-wrap { padding: 0; max-width: none; margin: 0; }
    body.mode-hocha .print-toolbar { padding: 12px; }
    .hocha-page {
      box-sizing: border-box; margin: 0 auto 8mm;
      display: flex; page-break-after: always;
      border: 1px dashed #ccc; background: #fff; overflow: hidden;
    }
    .hocha-page:last-child { page-break-after: auto; }

    body.orient-landscape .hocha-page {
      width: 297mm; height: 210mm; padding: 4mm 6mm; flex-direction: column;
    }
    body.orient-landscape .hocha-top { width: 100%; text-align: center; }
    body.orient-landscape .hocha-bottom { display: flex; flex: 1; align-items: center; gap: 14mm; width: 100%; }
    body.orient-landscape .hocha-info { flex: 1; text-align: center; }
    body.orient-landscape .hocha-qr-wrap { flex: none; text-align: center; }
    body.orient-landscape .hocha-num { font-size: 240pt; line-height: 0.85; margin: 0 0 3mm; }
    body.orient-landscape .hocha-color { font-size: 60pt; margin-bottom: 5mm; }
    body.orient-landscape .hocha-plate { font-size: 56pt; padding: 4mm 14mm; margin-bottom: 7mm; }
    body.orient-landscape .hocha-crew-line { font-size: 36pt; margin-top: 5mm; }
    body.orient-landscape .hocha-qr-img { width: 140px; height: 140px; }

    body.orient-portrait .hocha-page {
      width: 210mm; height: 297mm; padding: 8mm 8mm 8mm; flex-direction: column;
    }
    body.orient-portrait .hocha-top { width: 100%; text-align: center; }
    body.orient-portrait .hocha-bottom { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
    body.orient-portrait .hocha-info { text-align: center; margin-bottom: 10mm; }
    body.orient-portrait .hocha-qr-wrap { text-align: center; margin-top: auto; }
    body.orient-portrait .hocha-num { font-size: 175pt; line-height: 0.85; margin: 0 0 8mm; }
    body.orient-portrait .hocha-color { font-size: 64pt; margin-bottom: 6mm; }
    body.orient-portrait .hocha-plate { font-size: 58pt; padding: 5mm 16mm; margin-bottom: 9mm; }
    body.orient-portrait .hocha-crew-line { font-size: 40pt; margin-top: 6mm; }
    body.orient-portrait .hocha-qr-img { width: 130px; height: 130px; }

    .hocha-num { font-weight: 900; color: #e67e22; white-space: nowrap; }
    .hocha-color { font-weight: 700; color: #34495e; line-height: 1; white-space: nowrap; }
    .hocha-plate {
      font-weight: 800; color: #fff; background: #2c3e50;
      font-family: monospace; letter-spacing: 2mm;
      display: inline-block; line-height: 1; white-space: nowrap;
      border-radius: 4mm; box-shadow: 0 2mm 4mm rgba(0,0,0,0.15);
    }
    .hocha-crew-line {
      font-weight: 700; color: #2c3e50; line-height: 1.1;
      margin-top: 4mm; white-space: nowrap;
      display: flex; align-items: center; justify-content: center; gap: 4mm;
    }
    .hocha-crew-line .role-badge {
      display: inline-block; background: #3498db; color: #fff;
      padding: 2mm 5mm; border-radius: 3mm; font-size: 0.7em; font-weight: 800; letter-spacing: 1mm;
    }
    .hocha-crew-line .role-badge.assist { background: #16a085; }
    .hocha-crew-line .crew-name { color: #2c3e50; }
    .hocha-crew-line .phone { color: #666; font-family: monospace; font-size: 0.65em; letter-spacing: 0.5mm; }
    .hocha-qr img { display: block; margin: 0 auto; }
    .hocha-qr-label { font-size: 12pt; font-weight: 600; color: #2c3e50; margin-top: 4mm; max-width: 240px; line-height: 1.4; text-align: left; }
    .hocha-qr-label .qr-step { display: flex; align-items: center; gap: 2mm; margin: 1.5mm 0; white-space: nowrap; }
    .hocha-qr-label .qr-step-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 6mm; height: 6mm; border-radius: 50%;
      background: #e67e22; color: #fff; font-weight: 800; font-size: 10pt; flex-shrink: 0;
    }
    .hocha-qr-label b { color: #e67e22; }

    @media print {
      body.mode-hocha .print-wrap { padding: 0; }
      .hocha-page { border: none; margin: 0; }
      .print-toolbar { display: none; }
    }
  </style>
</head>
<body class="sz-m">
<div class="print-wrap">
  <div class="print-toolbar no-print">
    <a href="index.html" class="btn gray small">← 홈</a>
    <label>행사:</label>
    <select id="eventFilter" onchange="render()">
      <option value="">전체</option>
    </select>
    <label>크기:</label>
    <select id="sizeSel" onchange="changeSize()">
      <option value="sz-s">작게</option>
      <option value="sz-m" selected>보통</option>
      <option value="sz-l">크게</option>
    </select>
    <label>모드:</label>
    <select id="printMode" onchange="render()" style="width:auto;display:inline-block;">
      <option value="course">코스 / 조 인쇄</option>
      <option value="hocha">🚐 호차 인쇄</option>
    </select>
    <label>방향:</label>
    <select id="orientSel" onchange="render()" style="width:auto;display:inline-block;">
      <option value="portrait">세로 (Portrait)</option>
      <option value="landscape">가로 (Landscape)</option>
    </select>
    <label class="modeOptCourse" style="display:flex;align-items:center;gap:4px;cursor:pointer;">
      <input id="onlyFeaturedCourse" type="checkbox" onchange="render()">
      <span>⭐ 대표 코스만</span>
    </label>
    <label class="modeOptCourse" style="display:flex;align-items:center;gap:4px;cursor:pointer;">
      <input id="onlyFeatured" type="checkbox" onchange="render()">
      <span>⭐ 대표 거점만</span>
    </label>
    <button class="success" onclick="window.print()">🖨 인쇄</button>
    <button class="small modeOptCourse" onclick="editNotice()">✎ 공지 편집</button>
    <span style="color:#888;font-size:12px;">PC: Ctrl+P / 폰: 메뉴 → 인쇄/PDF</span>
  </div>

  <div id="printContent" class="print-content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js?v=20260512v"></script>
<script src="common.js?v=20260611a"></script>
<script>
window.onAuthSuccess = () => onDataReady(initEventFilter);
window.onDataChanged = () => render();
checkAdminAuth().then(ok => { if (ok) onDataReady(initEventFilter); });

function initEventFilter() {
  const data = loadData();
  const sel = document.getElementById('eventFilter');
  const cur = sel.value;
  const evVis = (data.visibility || {}).events || {};
  const visibleEvents = (data.events || []).filter(e => evVis[e.id] !== false);
  sel.innerHTML = '<option value="">전체</option>' +
    visibleEvents.map(e => `<option value="${e.id}"${cur===e.id?' selected':''}>${e.name}</option>`).join('');
  const params = new URLSearchParams(location.search);
  const mode = params.get('mode');
  if (mode === 'hocha') {
    const ms = document.getElementById('printMode');
    if (ms) ms.value = 'hocha';
  }
  render();
}

function changeSize() {
  const v = document.getElementById('sizeSel').value;
  document.body.classList.remove('sz-s', 'sz-m', 'sz-l');
  document.body.classList.add(v);
}

function editNotice() {
  const data = loadData();
  const cur = data.printNotice || '⚠ 우천시 방역 금지!';
  const next = prompt('인쇄 시 표시할 공지 멘트 (줄바꿈 가능)', cur);
  if (next === null) return;
  data.printNotice = next;
  saveData(data);
}

function renderHocha() {
  const data = loadData();
  const params = new URLSearchParams(location.search);
  const onlyId = params.get('v');
  let vehicles = (data.vehicles || []).slice().sort((a, b) => (a.order || 9999) - (b.order || 9999));
  if (onlyId) vehicles = vehicles.filter(v => v.id === onlyId);
  const todayUrl = location.origin + location.pathname.replace(/print\.html$/, '') + 'today.html';
  const qrApi = (url) => `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
  const esc = s => String(s||'').replace(/</g,'&lt;');
  if (!vehicles.length) {
    document.getElementById('printContent').innerHTML = '<div class="empty" style="padding:40px;text-align:center;">등록된 차량이 없습니다.<br>인원관리에서 차량을 먼저 추가하세요.</div>';
    return;
  }
  const pages = vehicles.map((v, idx) => {
    const drvMember = getMember(data, v.defaultDriverId);
    const astMember = getMember(data, v.defaultAssistId);
    const drvName = drvMember?.name || v.defaultDriverName || '';
    const drvPhone = drvMember?.phone || v.defaultDriverPhone || '';
    const astName = astMember?.name || v.defaultAssistName || '';
    const astPhone = astMember?.phone || v.defaultAssistPhone || '';
    const orderNum = v.order || (idx + 1);
    return `
      <div class="hocha-page">
        <div class="hocha-top">
          <div class="hocha-num">${orderNum}호차</div>
        </div>
        <div class="hocha-bottom">
          <div class="hocha-info">
            ${v.color ? `<div class="hocha-color">${esc(v.color)}</div>` : ''}
            ${v.plate ? `<div class="hocha-plate">${esc(v.plate)}</div>` : ''}
            ${drvName ? `<div class="hocha-crew-line"><span class="role-badge">운전</span><span class="crew-name">${esc(drvName)}</span>${drvPhone ? `<span class="phone">${esc(drvPhone)}</span>` : ''}</div>` : ''}
            ${astName ? `<div class="hocha-crew-line"><span class="role-badge assist">보조</span><span class="crew-name">${esc(astName)}</span>${astPhone ? `<span class="phone">${esc(astPhone)}</span>` : ''}</div>` : ''}
          </div>
          <div class="hocha-qr-wrap">
            <img class="hocha-qr-img" src="${qrApi(todayUrl)}" alt="QR" style="display:block;margin:0 auto;">
            <div class="hocha-qr-label">
              <div class="qr-step"><span class="qr-step-num">1</span> 카메라로 QR 스캔</div>
              <div class="qr-step"><span class="qr-step-num">2</span> <b>오늘 운영</b> 열기</div>
              <div class="qr-step"><span class="qr-step-num">3</span> 내 <b>호차 버튼</b> 누르기</div>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('printContent').innerHTML = pages;
}

function render() {
  const mode = document.getElementById('printMode')?.value || 'course';
  const orient = document.getElementById('orientSel')?.value || 'portrait';

  document.body.classList.toggle('mode-hocha', mode === 'hocha');
  document.body.classList.remove('orient-landscape', 'orient-portrait');
  document.body.classList.add('orient-' + orient);

  // 동적 @page 스타일
  let pageStyle = document.getElementById('dynamicPageStyle');
  if (!pageStyle) {
    pageStyle = document.createElement('style');
    pageStyle.id = 'dynamicPageStyle';
    document.head.appendChild(pageStyle);
  }
  pageStyle.textContent = `@page { size: A4 ${orient}; margin: ${orient === 'landscape' ? '6mm' : '10mm'}; }`;

  document.querySelectorAll('.modeOptCourse').forEach(el => {
    el.style.display = mode === 'course' ? '' : 'none';
  });

  if (mode === 'hocha') {
    return renderHocha();
  }

  const data = loadData();
  const eventFilter = document.getElementById('eventFilter').value;

  // ─── 조 테이블 ───
  const teams = data.teams || [];
  const teamTables = teams.map((t, idx) => {
    const headerClass = ['', 't2', 't3', 't4', 't5'][idx % 5];
    const leader = getMember(data, t.leaderId);
    const vice = getMember(data, t.viceLeaderId);
    const memberRows = (t.memberIds || []).map(id => {
      const m = getMember(data, id);
      if (!m) return '';
      return `<tr><td class="role-cell">팀원</td><td class="name-cell">${m.name}</td><td class="phone-cell">${m.phone || ''}</td></tr>`;
    }).join('');
    const fixedRows = (t.fixedMemberIds || []).map(id => {
      const m = getMember(data, id);
      if (!m) return '';
      return `<tr><td class="role-cell" style="background:#f3e8ff;">고정</td><td class="name-cell">${m.name}</td><td class="phone-cell">${m.phone || ''}</td></tr>`;
    }).join('');
    return `
      <table class="team-table">
        <tr><td colspan="3" class="team-header ${headerClass}">${t.name}</td></tr>
        <tr><td class="role-cell">조장</td><td class="name-cell">${leader?.name || ''}</td><td class="phone-cell">${leader?.phone || ''}</td></tr>
        <tr><td class="role-cell">부조장</td><td class="name-cell">${vice?.name || ''}</td><td class="phone-cell">${vice?.phone || ''}</td></tr>
        ${memberRows}
        ${fixedRows}
      </table>
    `;
  }).join('');

  // ─── 예비조 ───
  const reserveIds = data.reserveMemberIds || [];
  const reserveText = reserveIds
    .map(id => { const m = getMember(data, id); return m ? `${m.position ? m.position + ' ' : ''}${m.name}` : ''; })
    .filter(Boolean).join(' · ');

  // ─── 코스 + 거점 (기본: 전체) ───
  const onlyFeatured = document.getElementById('onlyFeatured')?.checked;
  const onlyFeaturedCourse = document.getElementById('onlyFeaturedCourse')?.checked;
  let courseHtml = '';
  const _evVis = ((data.visibility || {}).events || {});
  for (const ev of (data.events || [])) {
    if (_evVis[ev.id] === false) continue;
    if (eventFilter && ev.id !== eventFilter) continue;
    let courses = ev.courses || [];
    if (onlyFeaturedCourse) {
      courses = courses.filter(c => c.featured);
    }
    if (onlyFeaturedCourse && !courses.length) continue;
    courseHtml += `<h2 style="margin:14px 0 6px;border-bottom:2px solid #1f2937;padding-bottom:4px;">${ev.name}${onlyFeaturedCourse ? ' <span style="color:#f39c12;font-size:0.8em;font-weight:400;">⭐ 대표 코스만</span>' : ''}</h2>`;
    for (const c of courses) {
      const allAnchors = (data.anchors || [])
        .filter(a => a.courseId === c.id)
        .sort((a, b) => (a.order || 0) - (b.order || 0));
      const featuredAnchors = allAnchors.filter(a => a.featured);
      const useAnchors = onlyFeatured ? featuredAnchors : allAnchors;
      if (!useAnchors.length) {
        const msg = onlyFeatured
          ? `<span style="color:#aaa;">⭐ 대표 거점이 표시되지 않았습니다 (admin에서 ☆ 클릭)</span>`
          : '거점 없음';
        courseHtml += `<div class="course-item"><div class="label" style="color:${c.color}">${c.name}${c.detail ? ' <span style="color:#666;font-weight:normal;font-size:0.85em;">(' + c.detail + ')</span>' : ''}</div><div class="sub">${msg}</div></div>`;
        continue;
      }
      const arrowList = useAnchors.map(a => a.featured ? `<b>⭐${a.name}</b>` : a.name).join(' → ');
      const noteLabel = onlyFeatured
        ? `대표 ${featuredAnchors.length}개 / 전체 ${allAnchors.length}개`
        : `${allAnchors.length}개 거점`;
      courseHtml += `
        <div class="course-item">
          <div class="label" style="color:${c.color}">${c.name}${c.detail ? ' <span style="color:#666;font-weight:normal;font-size:0.85em;">(' + c.detail + ')</span>' : ''} <span style="color:#888;font-weight:400;font-size:0.85em;">(${noteLabel})</span></div>
          <div class="anchors">출발 → ${arrowList}</div>
        </div>
      `;
    }
  }

  // ─── QR ───
  const baseUrl = location.origin + location.pathname.replace(/print\.html$/, '');
  const todayUrl = baseUrl + 'today.html';
  const monitorUrl = baseUrl + 'monitor.html';
  const qrSize = 130;
  const qrApi = (url) => `https://api.qrserver.com/v1/create-qr-code/?size=${qrSize}x${qrSize}&data=${encodeURIComponent(url)}`;

  // ─── 공지 ───
  const notice = (data.printNotice || '⚠ 우천시 방역 금지!').replace(/</g, '&lt;');

  document.getElementById('printContent').innerHTML = `
    <div class="teams-grid">
      ${teamTables}
    </div>

    ${reserveIds.length ? `
      <div class="reserve-box">
        <b>🔁 예비조 (인원 부족시 대리방역):</b>
        <span style="margin-left:6px;">${reserveText}</span>
      </div>
    ` : ''}

    <div class="warn-box">${notice}</div>

    <div class="course-list">
      ${courseHtml || '<div class="empty">코스가 없습니다</div>'}
    </div>

    <div class="notes">
      <p>※ 방역 참여인원은 방역기록시트에 입력하고 사무국장에게 카톡으로 출석문자 발송 필</p>
      <p>※ 방역 실시후 사무국장에게 출발사진 및 방역 실시 사진 3매 이상 발송 필</p>
      <p>※ 각 조장님들께서는 해당 일자에 조원분들 편성 통제해주시기 바랍니다.</p>
    </div>

    <div class="qr-row">
      <div class="qr-cell">
        <img src="${qrApi(todayUrl)}" alt="오늘운영 QR" width="${qrSize}" height="${qrSize}">
        오늘운영 (방역 시작)
      </div>
      <div class="qr-cell">
        <img src="${qrApi(monitorUrl)}" alt="모니터링 QR" width="${qrSize}" height="${qrSize}">
        모니터링
      </div>
    </div>
  `;
}
</script>
</body>
</html>
