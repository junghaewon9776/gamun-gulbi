<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>회원민원</title>
  <link rel="stylesheet" href="style.css?v=20260611b">
  <style>
    .cat-btn {
      display:inline-flex;align-items:center;gap:6px;
      padding:10px 16px;border:none;border-radius:10px;
      background:#34495e;font-size:14px;font-weight:600;cursor:pointer;
      transition:all .15s;color:#fff;
    }
    .cat-btn:hover { background:#2c3e50; }
    .cat-btn.selected { background:#2980b9;color:#fff; }
    .cat-btn .cat-icon { font-size:20px; }

    .sub-btn {
      display:inline-block;padding:7px 14px;border:none;border-radius:8px;
      background:#7f8c8d;font-size:13px;cursor:pointer;transition:all .15s;color:#fff;
    }
    .sub-btn:hover { background:#6c7a89; }
    .sub-btn.selected { background:#27ae60;color:#fff;font-weight:600; }

    .inq-card {
      border:1px solid #e0e0e0;border-radius:10px;padding:14px;margin-bottom:10px;
      background:#fff;transition:box-shadow .15s;
    }
    .inq-card:hover { box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .status-badge {
      display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;
    }
    .status-pending { background:#fff3cd;color:#856404; }
    .status-progress { background:#d1ecf1;color:#0c5460; }
    .status-resolved { background:#d4edda;color:#155724; }

    .admin-board { display:none; }
    body.is-admin .admin-board { display:block; }
    body.is-admin .admin-only { display:initial !important; }

    /* 게시판 (회원용) */
    .member-board { display:none; }
    body.is-member .member-board { display:block; }

    /* 회원 답변 버튼 */
    .reply-toggle {
      display:inline-block;padding:5px 12px;border-radius:6px;border:none;
      background:#27ae60;color:#fff;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;
    }
    .reply-toggle:hover { background:#219a52; }

    /* 분류 편집 모달 태그 */
    .ce-sub-tag {
      display:inline-flex;align-items:center;gap:4px;
      background:#ebf5fb;border:1px solid #aed6f1;padding:5px 10px;border-radius:14px;font-size:13px;
    }
    .ce-sub-del {
      cursor:pointer;color:#e74c3c;font-weight:700;font-size:15px;line-height:1;
    }
    .ce-sub-del:hover { color:#c0392b; }
  </style>
</head>
<body>
<header>
  <h1>📋 회원민원</h1>
  <nav>
    <a href="index.html">홈</a>
    <a href="admin.html">관리</a>
    <a href="members.html">인원</a>
    <a href="today.html">오늘운영</a>
    <a href="monitor.html">모니터링</a>
    <a href="inquiry.html" class="active">민원</a>
    <a href="teams.html">조별</a>
    <a href="stats.html">통계</a>
    <a href="#" id="loginLink" onclick="showLoginGate();return false;">로그인</a>
    <a href="#" id="logoutLink" onclick="inqLogout();return false;" style="display:none;">로그아웃</a>
  </nav>
</header>

<div class="container">
  <!-- ─── 접수 폼 ─── -->
  <div class="card" style="border-left:4px solid #3498db;">
    <h2>✏️ 회원민원 접수</h2>
    <p class="muted" style="font-size:13px;margin-bottom:14px;">해당하는 분류를 선택하고 내용을 작성해주세요.</p>

    <label style="font-size:13px;font-weight:700;margin-bottom:6px;display:block;">분류 선택</label>
    <select id="categorySel" onchange="selectCategory(this.value)" style="width:100%;padding:10px 12px;border:2px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:14px;box-sizing:border-box;background:#fff;">
      <option value="">-- 분류를 선택하세요 --</option>
    </select>

    <div id="subCategoryArea" style="display:none;margin-bottom:14px;">
      <label style="font-size:13px;font-weight:700;margin-bottom:6px;display:block;">상세 항목</label>
      <select id="subCategorySel" onchange="selectSub(this.value)" style="width:100%;padding:10px 12px;border:2px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box;background:#fff;">
        <option value="">-- 항목을 선택하세요 --</option>
      </select>
    </div>

    <label style="font-size:13px;font-weight:700;">상세 내용</label>
    <textarea id="inqContent" rows="3" placeholder="구체적인 상황을 적어주세요" style="width:100%;box-sizing:border-box;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;resize:vertical;margin-bottom:12px;"></textarea>

    <label style="font-size:13px;font-weight:700;">연락처 <span style="font-weight:400;color:#aaa;">(선택)</span></label>
    <input id="inqPhone" type="tel" placeholder="010-0000-0000" style="width:100%;box-sizing:border-box;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:16px;">

    <button onclick="submitInquiry()" style="width:100%;padding:14px;background:#2980b9;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;">
      📨 접수하기
    </button>
  </div>

  <!-- ─── 내 접수 내역 ─── -->
  <div class="card">
    <h2>📜 내 접수 내역</h2>
    <div id="myInquiryList"></div>
  </div>

  <!-- ─── 회원 게시판 (로그인 회원용) ─── -->
  <div class="card member-board" style="border-left:4px solid #3498db;">
    <h2>📋 민원 게시판</h2>
    <p class="muted" style="font-size:12px;margin-bottom:10px;">전체 접수된 민원 현황을 확인할 수 있습니다.</p>
    <div id="memberBoardList"></div>
  </div>

  <!-- ─── 관리자 게시판 ─── -->
  <div class="card admin-board" style="border-left:4px solid #e67e22;">
    <div class="flex-between">
      <h2>⚙️ 전체 민원 관리</h2>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        <select id="adminFilterCat" onchange="renderAdminBoard()" style="font-size:12px;padding:4px;">
          <option value="">전체 분류</option>
        </select>
        <select id="adminFilterStatus" onchange="renderAdminBoard()" style="font-size:12px;padding:4px;">
          <option value="">전체 상태</option>
          <option value="pending">대기</option>
          <option value="progress">처리중</option>
          <option value="resolved">완료</option>
        </select>
      </div>
    </div>
    <p class="muted" style="font-size:12px;margin-bottom:8px;">상태 변경, 메모 작성, 삭제 가능</p>

    <!-- 분류 편집 -->
    <details style="margin-bottom:12px;">
      <summary style="cursor:pointer;font-size:13px;font-weight:700;color:#e67e22;">🔧 분류 항목 편집</summary>
      <div id="categoryEditor" style="margin-top:8px;"></div>
      <button onclick="addCategory()" class="small success" style="margin-top:6px;">+ 분류 추가</button>
    </details>

    <div id="adminBoardList"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js?v=20260512v"></script>
<script src="common.js?v=20260611a"></script>
<script>
// ────── 기본 분류 데이터 ──────
const DEFAULT_CATEGORIES = [
  { id: 'course',  icon: '🗺', name: '코스관련',    subs: ['코스 분배', '코스 변경', '코스 추가', '코스 삭제', '조 변경'] },
  { id: 'vehicle', icon: '🚐', name: '차량',       subs: ['시동 불량', '타이어 펑크', '에어컨 고장', '배터리 방전', '엔진오일', '경고등', '접촉사고'] },
  { id: 'equip',   icon: '🔧', name: '방역기계',   subs: ['라보 방전', '분무기 고장', '호스 파손', '노즐 막힘', '압력 이상', '모터 소음'] },
  { id: 'drink',   icon: '🧊', name: '음료·간식',   subs: ['생수 부족', '음료 보충', '얼음 필요', '간식 요청', '컵·종이컵 부족'] },
  { id: 'fuel',    icon: '⛽', name: '주유·충전',   subs: ['기름 부족', '주유소 위치 문의', '충전 필요', '주유카드 문제'] },
  { id: 'payment', icon: '💳', name: '결제·비용',   subs: ['법인카드 문의', '영수증 처리', '식비 정산', '자재 구매', '기타 결제'] },
  { id: 'safety',  icon: '⚠️', name: '안전·사고',  subs: ['부상', '벌쏘임', '미끄러짐', '열사병', '기타 사고'] },
  { id: 'resident',icon: '🏠', name: '주민 민원',   subs: ['소음 민원', '약제 피해', '주차 민원', '방역 요청'] },
  { id: 'etc',     icon: '💬', name: '기타',        subs: [] }
];

let selectedCat = '';
let selectedSub = '';

// ────── 초기화 ──────
function refreshInquiryPage() {
  const role = getMyRole();
  const isAdmin = role === 'admin' || role === 'super';
  const u = fbAuth.currentUser;
  const loggedIn = u && !u.isAnonymous;
  const isMember = loggedIn && !isAdmin;

  document.body.classList.toggle('is-admin', isAdmin);
  document.body.classList.toggle('is-member', isMember);

  // 로그인/로그아웃 링크 전환
  document.getElementById('loginLink').style.display = loggedIn ? 'none' : '';
  document.getElementById('logoutLink').style.display = loggedIn ? '' : 'none';

  // 회원 nav 제어
  if (typeof applyMemberNav === 'function') applyMemberNav();

  renderCategoryBtns();
  renderMyInquiries();
  renderMemberBoard();
  renderAdminBoard();
  renderCategoryEditor();
}

// 로그인 성공 콜백 (common.js doLogin에서 호출됨)
window.onAuthSuccess = () => {
  const gate = document.getElementById('loginGate');
  if (gate) gate.remove();
  onDataReady(refreshInquiryPage);
};
window.onDataChanged = () => {
  refreshInquiryPage();
};

function inqLogout() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  _signingOut = true;
  stopFirebaseSync();
  fbAuth.signOut().then(() => {
    return fbAuth.signInAnonymously();
  }).then(() => {
    location.reload();
  }).catch(() => {
    location.reload();
  });
}

ensureAnonAuth().then(() => {
  initFirebaseSync();
  onDataReady(refreshInquiryPage);
});

// ────── 분류 가져오기 (DB 우선, 없으면 기본) ──────
function getCategories() {
  const data = loadData();
  let cats = (data.inquiryCategories && data.inquiryCategories.length)
    ? data.inquiryCategories.slice()
    : JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
  // 코스관련 분류가 누락된 옛 데이터 보강: 맨 앞에 자동 추가
  if (!cats.some(c => c.id === 'course')) {
    const courseCat = DEFAULT_CATEGORIES.find(c => c.id === 'course');
    if (courseCat) cats = [JSON.parse(JSON.stringify(courseCat)), ...cats];
  }
  return cats;
}

// ────── 분류 버튼 렌더 ──────
function renderCategoryBtns() {
  const cats = getCategories().filter(c => !c.disabled);
  const el = document.getElementById('categorySel');
  el.innerHTML = '<option value="">-- 분류를 선택하세요 --</option>' +
    cats.map(c => `<option value="${c.id}" ${selectedCat === c.id ? 'selected' : ''}>${c.icon} ${c.name}</option>`).join('');
  // 하위 항목도 갱신
  if (selectedCat) selectCategory(selectedCat);
}

function selectCategory(catId) {
  selectedCat = catId;
  selectedSub = '';
  const cats = getCategories();
  const cat = cats.find(c => c.id === catId);
  const area = document.getElementById('subCategoryArea');
  const el = document.getElementById('subCategorySel');
  if (cat && cat.subs && cat.subs.length) {
    area.style.display = 'block';
    el.innerHTML = '<option value="">-- 항목을 선택하세요 --</option>' +
      cat.subs.map(s => `<option value="${s}">${s}</option>`).join('') +
      '<option value="직접입력">✏ 직접입력</option>';
  } else {
    area.style.display = 'none';
    el.innerHTML = '';
  }
}

function selectSub(val) {
  selectedSub = val;
  if (val === '직접입력') {
    const ta = document.getElementById('inqContent');
    ta.focus();
    ta.placeholder = '직접 상세 내용을 입력해주세요';
  } else {
    document.getElementById('inqContent').placeholder = '구체적인 상황을 적어주세요';
  }
}

// ────── 접수 ──────
function submitInquiry() {
  if (!selectedCat) { alert('분류를 선택해주세요'); return; }
  const content = (document.getElementById('inqContent').value || '').trim();
  const phone = (document.getElementById('inqPhone').value || '').trim();
  const cats = getCategories();
  const cat = cats.find(c => c.id === selectedCat);

  if (!selectedSub && cat.subs?.length) { alert('상세 항목을 선택해주세요'); return; }
  if (selectedSub === '직접입력' && !content) { alert('직접입력을 선택하셨으면 내용을 작성해주세요'); return; }

  const data = loadData();
  if (!Array.isArray(data.inquiries)) data.inquiries = [];

  const u = fbAuth.currentUser;
  const uInfo = u && !u.isAnonymous ? (data.users || {})[u.uid] : null;
  const memberId = u ? (data.memberAuth || {})[u.uid] : null;
  const member = memberId ? (data.members || []).find(m => m.id === memberId) : null;
  const writerName = member?.name || uInfo?.name || u?.email || getDeviceName() || '익명';

  const inquiry = {
    id: uid(),
    category: selectedCat,
    categoryName: cat?.name || selectedCat,
    subCategory: selectedSub !== '직접입력' ? selectedSub : '',
    content,
    phone: phone || member?.phone || '',
    writer: writerName,
    writerUid: u?.uid || '',
    deviceName: getDeviceName() || '',
    status: 'pending',
    adminMemo: '',
    comments: [],
    createdAt: Date.now()
  };
  data.inquiries.push(inquiry);
  saveData(data);

  // 텔레그램 알림
  sendTelegram(`📋 <b>회원민원 접수</b>\n분류: ${cat?.icon || ''} ${cat?.name || ''}\n항목: ${selectedSub || '-'}\n내용: ${(content || '-').slice(0, 80)}\n접수자: ${writerName}${phone ? '\n연락처: ' + phone : ''}`);

  // 초기화
  selectedCat = ''; selectedSub = '';
  document.getElementById('inqContent').value = '';
  document.getElementById('inqPhone').value = '';
  renderCategoryBtns();
  document.getElementById('subCategoryArea').style.display = 'none';
  document.getElementById('subCategorySel').innerHTML = '<option value="">-- 항목을 선택하세요 --</option>';
  renderMyInquiries();
  renderMemberBoard();
  renderAdminBoard();
  alert('✅ 접수되었습니다!\n관리자가 확인 후 처리할 예정입니다.');
}

// ────── 내 접수 내역 ──────
function renderMyInquiries() {
  const data = loadData();
  const u = fbAuth.currentUser;
  const el = document.getElementById('myInquiryList');
  if (!u || !data.inquiries?.length) {
    el.innerHTML = '<div class="empty" style="padding:20px;text-align:center;color:#aaa;">접수 내역이 없습니다</div>';
    return;
  }
  const myUid = u.uid;
  const deviceName = getDeviceName();
  const role = getMyRole();
  const isAdmin = role === 'admin' || role === 'super';
  const mine = (data.inquiries || [])
    .filter(q => q.writerUid === myUid || (deviceName && q.deviceName === deviceName))
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  if (!mine.length) {
    el.innerHTML = '<div class="empty" style="padding:20px;text-align:center;color:#aaa;">접수 내역이 없습니다</div>';
    return;
  }
  el.innerHTML = mine.map(q => renderInquiryCard(q, isAdmin, true)).join('');
}

// ────── 회원 게시판 (로그인 회원용 — 전체 문의 조회 + 답변) ──────
function renderMemberBoard() {
  const u = fbAuth.currentUser;
  const loggedIn = u && !u.isAnonymous;
  if (!loggedIn) return;
  const role = getMyRole();
  const isAdmin = role === 'admin' || role === 'super';
  if (isAdmin) return; // 관리자는 관리자 게시판 사용

  const data = loadData();
  const el = document.getElementById('memberBoardList');
  const all = (data.inquiries || []).slice().sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  if (!all.length) {
    el.innerHTML = '<div class="empty" style="padding:20px;text-align:center;color:#aaa;">접수된 민원이 없습니다</div>';
    return;
  }
  el.innerHTML = all.map(q => renderInquiryCard(q, false, false, true)).join('');
}

// renderInquiryCard(q, isAdmin, isOwner, isMemberView)
function renderInquiryCard(q, isAdmin, isOwner, isMemberView) {
  const cats = getCategories();
  const cat = cats.find(c => c.id === q.category);
  const statusMap = { pending: ['대기', 'status-pending'], progress: ['처리중', 'status-progress'], resolved: ['완료', 'status-resolved'] };
  const [statusText, statusClass] = statusMap[q.status] || statusMap.pending;
  const when = q.createdAt ? new Date(q.createdAt).toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
  const phoneTel = (q.phone || '').replace(/[^0-9+]/g, '');
  const u = fbAuth.currentUser;
  const loggedIn = u && !u.isAnonymous;

  // 답변/댓글 영역
  let replyHtml = '';
  if (q.reply) {
    replyHtml = `
      <div style="margin-top:10px;padding:12px;background:#eaf7ee;border-radius:8px;border-left:3px solid #27ae60;">
        <div style="font-size:12px;color:#27ae60;font-weight:700;margin-bottom:6px;">💡 답변 / 해결법</div>
        <div style="font-size:14px;color:#2c3e50;white-space:pre-wrap;line-height:1.6;">${(q.reply||'').replace(/</g,'&lt;')}</div>
        ${(q.replyImages && q.replyImages.length) ? `
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">
            ${q.replyImages.map((img,ii) => `<img src="${img}" onclick="viewReplyImage('${q.id}',${ii})" style="width:120px;height:90px;object-fit:cover;border-radius:8px;border:1px solid #ddd;cursor:pointer;">`).join('')}
          </div>
        ` : ''}
        ${q.repliedAt ? `<div style="font-size:11px;color:#999;margin-top:6px;">🕐 ${new Date(q.repliedAt).toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}${q.repliedBy ? ' · 👤 '+q.repliedBy : ''}</div>` : ''}
      </div>
    `;
  }

  // 댓글 목록
  const comments = q.comments || [];
  let commentsHtml = '';
  if (comments.length) {
    commentsHtml = `<div style="margin-top:10px;border-top:1px solid #eee;padding-top:8px;">
      <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:6px;">💬 댓글 (${comments.length})</div>
      ${comments.map(c => `
        <div style="padding:8px 10px;background:#f8f9fa;border-radius:6px;margin-bottom:4px;font-size:13px;">
          <span style="font-weight:700;color:#2c3e50;">${(c.writer||'').replace(/</g,'&lt;')}</span>
          <span style="color:#aaa;font-size:11px;margin-left:6px;">${c.createdAt ? new Date(c.createdAt).toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : ''}</span>
          <div style="margin-top:4px;color:#444;white-space:pre-wrap;">${(c.text||'').replace(/</g,'&lt;')}</div>
        </div>
      `).join('')}
    </div>`;
  }

  // 댓글 작성 (로그인 회원만)
  let commentFormHtml = '';
  if (loggedIn) {
    commentFormHtml = `
      <div style="margin-top:8px;">
        <button class="reply-toggle" onclick="toggleCommentForm('${q.id}')">💬 댓글 달기</button>
        <div id="commentForm_${q.id}" style="display:none;margin-top:6px;">

// ────── 댓글 ──────
function toggleCommentForm(id) {
  const form = document.getElementById('commentForm_' + id);
  if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

function submitComment(id) {
  const text = (document.getElementById('commentText_' + id).value || '').trim();
  if (!text) { alert('댓글 내용을 입력해주세요'); return; }
  const data = loadData();
  const q = (data.inquiries || []).find(x => x.id === id);
  if (!q) return;
  const u = fbAuth.currentUser;
  const uInfo = u ? (data.users || {})[u.uid] : null;
  const memberId = u ? (data.memberAuth || {})[u.uid] : null;
  const member = memberId ? (data.members || []).find(m => m.id === memberId) : null;
  const writerName = member?.name || uInfo?.name || u?.email || getDeviceName() || '익명';

  if (!Array.isArray(q.comments)) q.comments = [];
  q.comments.push({
    writer: writerName,
    writerUid: u?.uid || '',
    text,
    createdAt: Date.now()
  });
  saveData(data);
  renderMyInquiries();
  renderMemberBoard();
  renderAdminBoard();
}

// ────── 관리자 게시판 ──────
function renderAdminBoard() {
  if (!document.body.classList.contains('is-admin')) return;
  const data = loadData();
  const el = document.getElementById('adminBoardList');
  const all = (data.inquiries || []).slice().sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  // 필터
  const filterCat = document.getElementById('adminFilterCat').value;
  const filterStatus = document.getElementById('adminFilterStatus').value;
  const filtered = all.filter(q =>
    (!filterCat || q.category === filterCat) &&
    (!filterStatus || q.status === filterStatus)
  );

  // 분류 필터 옵션 갱신
  const cats = getCategories();
  const catSel = document.getElementById('adminFilterCat');
  const curCat = catSel.value;
  catSel.innerHTML = '<option value="">전체 분류</option>' +
    cats.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
  catSel.value = curCat;

  // 통계
  const pending = all.filter(q => q.status === 'pending').length;
  const progress = all.filter(q => q.status === 'progress').length;
  const resolved = all.filter(q => q.status === 'resolved').length;

  const statsHtml = `
    <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
      <span class="status-badge status-pending" style="font-size:13px;padding:6px 14px;">⏳ 대기 ${pending}</span>
      <span class="status-badge status-progress" style="font-size:13px;padding:6px 14px;">🔄 처리중 ${progress}</span>
      <span class="status-badge status-resolved" style="font-size:13px;padding:6px 14px;">✅ 완료 ${resolved}</span>
    </div>
  `;

  if (!filtered.length) {
    el.innerHTML = statsHtml + '<div class="empty">접수된 민원이 없습니다</div>';
    return;
  }
  el.innerHTML = statsHtml + filtered.map(q => renderInquiryCard(q, true, false)).join('');
}

function replyImgThumb(img, idx) {
  return `<div style="position:relative;display:inline-block;">
    <img src="${img}" style="width:100px;height:75px;object-fit:cover;border-radius:6px;border:1px solid #ddd;">
    <button onclick="removeReplyImage(${idx})" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:#e74c3c;color:#fff;border:none;font-size:13px;cursor:pointer;line-height:22px;padding:0;">✕</button>
  </div>`;
}

function removeReplyImage(idx) {
  __replyImages.splice(idx, 1);
  document.getElementById('replyImgPreview').innerHTML = __replyImages.map((img,i) => replyImgThumb(img,i)).join('');
}

function handleReplyImages(e) {
  const files = Array.from(e.target.files);
  e.target.value = '';
  if (!files.length) return;
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = () => {
      resizeImage(reader.result, 800, 0.7, (resized) => {
        __replyImages.push(resized);
        loaded++;
        if (loaded === files.length) {
          document.getElementById('replyImgPreview').innerHTML = __replyImages.map((img,i) => replyImgThumb(img,i)).join('');
        }
      });
    };
    reader.readAsDataURL(file);
  });
}

function resizeImage(dataUrl, maxWidth, quality, cb) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', quality));
  };
  img.src = dataUrl;
}

function saveReply(id) {
  const text = (document.getElementById('replyText').value || '').trim();
  if (!text && !__replyImages.length) { alert('답변 내용이나 사진을 하나 이상 입력해주세요'); return; }
  const data = loadData();
  const q = (data.inquiries || []).find(x => x.id === id);
  if (!q) return;
  const u = fbAuth.currentUser;
  const uInfo = u ? (data.users || {})[u.uid] : null;
  q.reply = text;
  q.replyImages = __replyImages.slice();
  q.repliedAt = Date.now();
  q.repliedBy = uInfo?.name || u?.email || '';
  if (q.status === 'pending') q.status = 'progress';
  saveData(data);
  document.getElementById('replyModal').remove();
  __replyImages = [];
}

      <label style="font-size:13px;font-weight:700;">분류명</label>
      <input id="ceName" type="text" value="${(c.name||'').replace(/"/g,'&quot;')}" placeholder="분류 이름"
        style="width:100%;box-sizing:border-box;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;font-weight:600;margin:4px 0 14px;">

      <!-- 사용 여부 -->
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer;">
        <input id="ceDisabled" type="checkbox" ${c.disabled ? 'checked' : ''} style="width:18px;height:18px;">
        <span style="font-size:13px;font-weight:700;color:#e74c3c;">사용안함</span>
        <span style="font-size:11px;color:#999;">(체크하면 접수 폼에서 숨겨집니다)</span>
      </label>

      <!-- 상세 항목 -->
      <label style="font-size:13px;font-weight:700;">상세 항목</label>
      <div id="ceSubList" style="display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 8px;">
        ${subsHtml}
      </div>
      <div style="display:flex;gap:6px;margin-bottom:14px;">
        <input id="ceSubNew" type="text" placeholder="항목명 입력" style="flex:1;padding:8px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;" onkeydown="if(event.key==='Enter'){ceSub_add();event.preventDefault();}">
        <button onclick="ceSub_add()" style="padding:8px 14px;background:#27ae60;color:#fff;border:none;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer;">+ 추가</button>
      </div>

      <!-- 버튼 -->
      <div style="display:flex;gap:8px;">
        <button onclick="saveCatEdit(${idx})" style="flex:1;background:#3498db;color:#fff;border:none;padding:13px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">💾 저장</button>
        <button onclick="document.getElementById('catEditModal').remove()" style="flex:1;background:#555;color:#fff;border:none;padding:13px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">취소</button>
      </div>
      <div style="text-align:center;margin-top:10px;">
        <button onclick="deleteCatFromModal(${idx})" style="background:none;border:none;color:#e74c3c;font-size:13px;cursor:pointer;text-decoration:underline;">이 분류 완전 삭제</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  // 상세 항목 임시 저장용
  window.__ceSubs = [...(c.subs || [])];
}

function ceSub_add() {
  const input = document.getElementById('ceSubNew');
  const name = (input.value || '').trim();
  if (!name) return;
  window.__ceSubs.push(name);
  input.value = '';
  ceSub_renderList();
}

function ceSub_remove(si) {
  window.__ceSubs.splice(si, 1);
  ceSub_renderList();
}

function ceSub_renderList() {
  const el = document.getElementById('ceSubList');
  el.innerHTML = window.__ceSubs.map((s, si) => `
    <span class="ce-sub-tag" id="ceSubTag_${si}">
      ${s}
      <span class="ce-sub-del" onclick="ceSub_remove(${si})">✕</span>
    </span>
  `).join('');
}

function saveCatEdit(idx) {
  const data = loadData();
  const cats = getCategories();
  if (!cats[idx]) return;
  cats[idx].icon = (document.getElementById('ceIconInput').value || '📌').trim();
  cats[idx].name = (document.getElementById('ceName').value || '').trim() || '미정';
  cats[idx].disabled = document.getElementById('ceDisabled').checked;
  cats[idx].subs = [...window.__ceSubs];
  data.inquiryCategories = cats;
  saveData(data);
  document.getElementById('catEditModal').remove();
  renderCategoryBtns();
  renderCategoryEditor();
}

function deleteCatFromModal(idx) {
  if (!confirm('이 분류를 완전히 삭제할까요?\n(기존 접수된 건에는 영향 없음)')) return;
  const data = loadData();
  const cats = getCategories();
  cats.splice(idx, 1);
  data.inquiryCategories = cats;
  saveData(data);
  document.getElementById('catEditModal').remove();
  renderCategoryBtns();
  renderCategoryEditor();
}

function moveCat(idx, dir) {
  const data = loadData();
  const cats = getCategories();
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= cats.length) return;
  [cats[idx], cats[swapIdx]] = [cats[swapIdx], cats[idx]];
  data.inquiryCategories = cats;
  saveData(data);
  renderCategoryBtns();
  renderCategoryEditor();
}

function addCategory() {
  const data = loadData();
  const cats = getCategories();
  const newIdx = cats.length;
  cats.push({ id: uid(), icon: '📌', name: '새 분류', subs: [], disabled: false });
  data.inquiryCategories = cats;
  saveData(data);
  renderCategoryBtns();
  renderCategoryEditor();
  // 바로 수정 모달 열기
  openCatEditModal(newIdx);
}
</script>
</body>
</html>
