function reverseGeocode(lat, lng) {
  const gc = new kakao.maps.services.Geocoder();
  gc.coord2Address(lng, lat, (result, status) => {
    const el = document.getElementById('lpAddrLabel');
    if (status === kakao.maps.services.Status.OK && result[0]) {
      const r = result[0];
      const road = r.road_address;
      const jibun = r.address;
      if (road) {
        __pickerAddr = road.address_name;
        if (el) el.textContent = '📍 ' + road.address_name + (jibun ? ` (${jibun.address_name})` : '');
      } else if (jibun) {
        __pickerAddr = jibun.address_name;
        if (el) el.textContent = '📍 ' + jibun.address_name;
      }
    } else {
      __pickerAddr = '';
      if (el) el.textContent = '📍 주소를 찾을 수 없는 위치';
    }
  });
}

function updatePickerCoord(lat, lng) {
  const el = document.getElementById('lpCoordLabel');
  if (el) el.textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
}

function locPickerSearch() {
  const q = (document.getElementById('lpAddrInput').value || '').trim();
  if (!q) return;
  const resultsDiv = document.getElementById('lpSearchResults');
  // 주소 검색 (Geocoder) 우선, 키워드(Places) 병행
  const gc = new kakao.maps.services.Geocoder();
  const ps = new kakao.maps.services.Places();
  let combined = [];
  let done = 0;
  const finish = () => {
    done++;
    if (done < 2) return;
    if (!combined.length) {
      resultsDiv.innerHTML = '<div style="padding:10px;color:#999;font-size:12px;">검색 결과 없음</div>';
      resultsDiv.style.display = 'block';
      return;
    }
    renderPickerResults(combined.slice(0, 10));
  };
  // 1) 주소 검색
  gc.addressSearch(q, (res, st) => {
    if (st === kakao.maps.services.Status.OK && res.length) {
      combined = res.map(r => ({
        place_name: r.address_name + (r.road_address ? ' (' + r.road_address.address_name + ')' : ''),
        y: r.y, x: r.x
      })).concat(combined);
    }
    finish();
  });
  // 2) 키워드 검색
  ps.keywordSearch(q, (data, status) => {
    if (status === kakao.maps.services.Status.OK && data.length) {
      combined = combined.concat(data.slice(0, 6).map(d => ({

function arqSelectReason(btn, reason) {
  // 모든 버튼 리셋
  document.querySelectorAll('#arqReasonBtns .arq-reason-btn').forEach(b => {

  btn.style.borderColor = '#e67e22'; btn.style.background = '#fef5eb'; btn.style.color = '#e67e22';
  const customInput = document.getElementById('arqReasonCustom');
  if (reason === '기타') {
    customInput.style.display = 'block';
    customInput.focus();
    __arqReason = '';
  } else {
    customInput.style.display = 'none';
    customInput.value = '';
    __arqReason = reason;
  }
}

function arqSwitchMode(mode) {
  const pinBtn = document.getElementById('arqModePin');
  const searchBtn = document.getElementById('arqModeSearch');
  const searchBox = document.getElementById('arqSearchBox');
  if (mode === 'pin') {
    pinBtn.style.background = '#e67e22'; pinBtn.style.color = '#fff';
    searchBtn.style.background = '#fff'; searchBtn.style.color = '#e67e22';
    searchBox.style.display = 'none';
  } else {
    searchBtn.style.background = '#e67e22'; searchBtn.style.color = '#fff';
    pinBtn.style.background = '#fff'; pinBtn.style.color = '#e67e22';
    searchBox.style.display = 'block';
    document.getElementById('arqAddrInput').focus();
  }
}

function arqDoSearch() {
  const q = (document.getElementById('arqAddrInput').value || '').trim();
  if (!q) return;
  const resultsDiv = document.getElementById('arqSearchResults');
  const gc = new kakao.maps.services.Geocoder();
  const ps = new kakao.maps.services.Places();
  let combined = []; let done = 0;
  const finish = () => {
    if (++done < 2) return;
    if (!combined.length) {
      resultsDiv.innerHTML = '<div style="padding:10px;color:#999;font-size:12px;">검색 결과 없음</div>';
      resultsDiv.style.display = 'block'; return;
    }
    resultsDiv.innerHTML = combined.slice(0, 10).map((r, i) =>
      `<div onclick="arqPickResult(${r.y},${r.x})" style="padding:9px 10px;cursor:pointer;border-bottom:1px solid #eee;font-size:13px;${i >= Math.min(combined.length, 10) - 1 ? 'border:none;' : ''}">${r.label}</div>`
    ).join('');
    resultsDiv.style.display = 'block';
  };
  gc.addressSearch(q, (res, st) => {
    if (st === kakao.maps.services.Status.OK && res.length)
      combined = res.map(r => ({ label: r.address_name + (r.road_address ? ' (' + r.road_address.address_name + ')' : ''), y: r.y, x: r.x })).concat(combined);
    finish();
  });
  ps.keywordSearch(q, (data, status) => {
    if (status === kakao.maps.services.Status.OK && data.length)
      combined = combined.concat(data.slice(0, 6).map(d => ({ label: d.place_name + (d.road_address_name ? ' · ' + d.road_address_name : ''), y: d.y, x: d.x })));
    finish();
  });
}

function arqPickResult(lat, lng) {
  lat = parseFloat(lat); lng = parseFloat(lng);
  const pos = new kakao.maps.LatLng(lat, lng);
  __arqMap.setCenter(pos);
  __arqMarker.setPosition(pos);
  arqUpdateAddr(lat, lng);
  document.getElementById('arqSearchResults').style.display = 'none';
}

function arqUpdateAddr(lat, lng) {
  const gc = new kakao.maps.services.Geocoder();
  gc.coord2Address(lng, lat, (result, status) => {
    const el = document.getElementById('arqAddrLabel');
    if (status === kakao.maps.services.Status.OK && result[0]) {
      const r = result[0];
      const road = r.road_address;
      const jibun = r.address;
      if (road) {
        __arqAddr = road.address_name;
        if (el) el.innerHTML = `📍 <b>${road.address_name}</b>${jibun ? `<br><span style="color:#888;font-size:11px;">(지번) ${jibun.address_name}</span>` : ''}`;
      } else if (jibun) {
        __arqAddr = jibun.address_name;
        if (el) el.innerHTML = `📍 <b>${jibun.address_name}</b>`;
      }
    } else {
      __arqAddr = '';
      if (el) el.innerHTML = '📍 <span style="color:#999;">주소를 찾을 수 없는 위치</span>';
    }
  });
}

function submitAnchorRequest() {
  const name = (document.getElementById('arqName').value || '').trim();
  const customReason = (document.getElementById('arqReasonCustom').value || '').trim();
  const reason = __arqReason || customReason;
  if (!reason) { alert('거점 추가 이유를 선택해주세요'); return; }

  const p = __arqMarker.getPosition();
  const lat = p.getLat(), lng = p.getLng();
  const address = __arqAddr || '';

  const data = loadData();
  if (!Array.isArray(data.requests)) data.requests = [];
  data.requests.push({
    id: uid(),
    lat, lng, address,
    name: name || '(이름 미정)',
    memo: reason,
    eventId: currentSession.eventId,
    courseId: currentSession.courseId,
    requestedBy: currentSession.crew?.driver || '',
    requestedAssist: currentSession.crew?.assist || '',
    requestedAt: Date.now(),
    status: 'pending'
  });
  try { saveData(data); }
  catch (e) { alert('저장 실패: ' + (e.message || e)); return; }

  document.getElementById('anchorReqModal').remove();
  __arqMap = null; __arqMarker = null;
  renderMapForSession();
  const addrLine = address ? `\n주소: ${address}` : '';
  sendTelegram(`📌 <b>거점 추가 요청</b>\n이름: ${name || '(이름 미정)'}\n이유: ${reason}${addrLine}\n위치: ${lat.toFixed(5)}, ${lng.toFixed(5)}\n요청자: ${tgPersonLink(currentSession.crew?.driver, currentSession.crew?.driverPhone)}${currentSession.crew?.assist ? ' / ' + tgPersonLink(currentSession.crew.assist, currentSession.crew?.assistPhone) : ''}`);
  alert('✅ 관리자에게 요청되었습니다.\n승인되면 정식 거점으로 추가됩니다.');
}

function resolveComplaintFromMap(id) {
  if (!confirm('이 민원을 처리완료로 바꿀까요?')) return;
  const data = loadData();
  const c = (data.complaints || []).find(x => x.id === id);
  if (!c) return;
  c.status = 'resolved';
  saveData(data);
  if (window.__openIw) { try { window.__openIw.close(); } catch (e) {} window.__openIw = null; }
  renderMapForSession();
}

          <div style="display:flex;gap:0;margin-bottom:8px;border-radius:8px;overflow:hidden;border:2px solid #e74c3c;">
            <button id="cmpModePin" onclick="cmpSwitchMode('pin')" style="flex:1;padding:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:#e74c3c;color:#fff;transition:all .15s;">📍 직접 핑추가</button>
            <button id="cmpModeSearch" onclick="cmpSwitchMode('search')" style="flex:1;padding:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:#e74c3c;transition:all .15s;">🔍 주소 검색</button>
          </div>
          <div id="cmpSearchBox" style="display:none;margin-bottom:6px;">
            <div style="display:flex;gap:6px;">
              <input id="cmpAddrInput" type="text" placeholder="주소 검색 (예: 법성포 법성리 123)" style="flex:1;padding:9px 10px;border:2px solid #eee;border-radius:8px;font-size:13px;" onkeydown="if(event.key==='Enter')cmpDoSearch()">
              <button onclick="cmpDoSearch()" style="background:#3498db;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;">검색</button>
            </div>
            <div id="cmpSearchResults" style="max-height:110px;overflow-y:auto;margin-top:4px;display:none;border:1px solid #ddd;border-radius:8px;background:#fafafa;"></div>
          </div>
          <div id="cmpMapContainer" style="width:100%;height:220px;border-radius:10px;overflow:hidden;border:2px solid #eee;"></div>
          <div id="cmpAddrLabel" style="margin-top:6px;font-size:12px;color:#2c3e50;min-height:16px;padding:6px 8px;background:#f8f9fa;border-radius:6px;"></div>
        </div>

        <!-- 버튼 -->
        <div style="display:flex;gap:8px;">
          <button onclick="submitComplaint()" style="flex:1;background:#e74c3c;color:#fff;border:none;padding:13px;border-radius:10px;font-weight:800;font-size:15px;cursor:pointer;">접수하기</button>
          <button onclick="document.getElementById('complaintModal').remove()" style="flex:1;background:#555;color:#fff;border:none;padding:13px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">취소</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  // 지도 초기화
  const center = new kakao.maps.LatLng(currentPos.lat, currentPos.lng);
  __cmpMap = new kakao.maps.Map(document.getElementById('cmpMapContainer'), { center, level: 3 });
  __cmpMarker = new kakao.maps.Marker({ position: center, draggable: true });
  __cmpMarker.setMap(__cmpMap);
  cmpUpdateAddr(currentPos.lat, currentPos.lng);

  kakao.maps.event.addListener(__cmpMarker, 'dragend', () => {
    const p = __cmpMarker.getPosition();
    cmpUpdateAddr(p.getLat(), p.getLng());
  });
  kakao.maps.event.addListener(__cmpMap, 'click', (e) => {
    __cmpMarker.setPosition(e.latLng);
    cmpUpdateAddr(e.latLng.getLat(), e.latLng.getLng());
  });
}

function cmpSelectType(btn, type) {
  document.querySelectorAll('#cmpTypeBtns .cmp-type-btn').forEach(b => {
    b.style.borderColor = '#eee'; b.style.background = '#fff'; b.style.color = '#333';
  });
  btn.style.borderColor = '#e74c3c'; btn.style.background = '#fef0ef'; btn.style.color = '#e74c3c';
  const customInput = document.getElementById('cmpTypeCustom');
  if (type === '기타') {
    customInput.style.display = 'block';
    customInput.focus();
    __cmpType = '';
  } else {
    customInput.style.display = 'none';
    customInput.value = '';
    __cmpType = type;
  }
}

function cmpSwitchMode(mode) {
  const pinBtn = document.getElementById('cmpModePin');
  const searchBtn = document.getElementById('cmpModeSearch');
  const searchBox = document.getElementById('cmpSearchBox');
  if (mode === 'pin') {
    pinBtn.style.background = '#e74c3c'; pinBtn.style.color = '#fff';
    searchBtn.style.background = '#fff'; searchBtn.style.color = '#e74c3c';
    searchBox.style.display = 'none';
  } else {
    searchBtn.style.background = '#e74c3c'; searchBtn.style.color = '#fff';
    pinBtn.style.background = '#fff'; pinBtn.style.color = '#e74c3c';
    searchBox.style.display = 'block';
    document.getElementById('cmpAddrInput').focus();
  }
}

function cmpDoSearch() {
  const q = (document.getElementById('cmpAddrInput').value || '').trim();
  if (!q) return;
  const resultsDiv = document.getElementById('cmpSearchResults');
  const gc = new kakao.maps.services.Geocoder();
  const ps = new kakao.maps.services.Places();
  let combined = []; let done = 0;
  const finish = () => {
    if (++done < 2) return;
    if (!combined.length) {
      resultsDiv.innerHTML = '<div style="padding:10px;color:#999;font-size:12px;">검색 결과 없음</div>';
      resultsDiv.style.display = 'block'; return;
    }
    resultsDiv.innerHTML = combined.slice(0, 10).map((r, i) =>
      `<div onclick="cmpPickResult(${r.y},${r.x})" style="padding:9px 10px;cursor:pointer;border-bottom:1px solid #eee;font-size:13px;${i >= Math.min(combined.length, 10) - 1 ? 'border:none;' : ''}">${r.label}</div>`
    ).join('');
    resultsDiv.style.display = 'block';
  };
  gc.addressSearch(q, (res, st) => {
    if (st === kakao.maps.services.Status.OK && res.length)
      combined = res.map(r => ({ label: r.address_name + (r.road_address ? ' (' + r.road_address.address_name + ')' : ''), y: r.y, x: r.x })).concat(combined);
    finish();
  });
  ps.keywordSearch(q, (data, status) => {
    if (status === kakao.maps.services.Status.OK && data.length)
      combined = combined.concat(data.slice(0, 6).map(d => ({ label: d.place_name + (d.road_address_name ? ' · ' + d.road_address_name : ''), y: d.y, x: d.x })));
    finish();
  });
}

function cmpPickResult(lat, lng) {
  lat = parseFloat(lat); lng = parseFloat(lng);
  const pos = new kakao.maps.LatLng(lat, lng);
  __cmpMap.setCenter(pos);
  __cmpMarker.setPosition(pos);
  cmpUpdateAddr(lat, lng);
  document.getElementById('cmpSearchResults').style.display = 'none';
}

function cmpUpdateAddr(lat, lng) {
  const gc = new kakao.maps.services.Geocoder();
  gc.coord2Address(lng, lat, (result, status) => {
    const el = document.getElementById('cmpAddrLabel');
    if (status === kakao.maps.services.Status.OK && result[0]) {
      const r = result[0];
      const road = r.road_address;
      const jibun = r.address;
      if (road) {
        __cmpAddr = road.address_name;
        if (el) el.innerHTML = `📍 <b>${road.address_name}</b>${jibun ? `<br><span style="color:#888;font-size:11px;">(지번) ${jibun.address_name}</span>` : ''}`;
      } else if (jibun) {
        __cmpAddr = jibun.address_name;
        if (el) el.innerHTML = `📍 <b>${jibun.address_name}</b>`;
      }
    } else {
      __cmpAddr = '';
      if (el) el.innerHTML = '📍 <span style="color:#999;">주소를 찾을 수 없는 위치</span>';
    }
  });
}

function formatPhoneInput(el) {
  let v = el.value.replace(/[^0-9]/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  if (v.length > 7) v = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7);
  else if (v.length > 3) v = v.slice(0, 3) + '-' + v.slice(3);
  el.value = v;
}

function submitComplaint() {
  const customType = (document.getElementById('cmpTypeCustom').value || '').trim();
  const type = __cmpType || customType;
  if (!type) { alert('민원 유형을 선택해주세요'); return; }

  const content = (document.getElementById('cmpContent').value || '').trim();
  const phone = (document.getElementById('cmpPhone').value || '').trim();
  const assignedCourseId = document.getElementById('cmpCourse').value || '';
  const p = __cmpMarker.getPosition();
  const lat = p.getLat(), lng = p.getLng();
  const address = __cmpAddr || '';
  const fullContent = content ? type + ' — ' + content : type;

  const data = loadData();
  if (!Array.isArray(data.complaints)) data.complaints = [];
  data.complaints.push({
    id: uid(),
    eventId: currentSession.eventId,
    courseId: assignedCourseId,
    lat, lng, address,
    phone, content: fullContent,
    area: '',
    status: 'pending',
    reportedBy: currentSession.crew?.driver || '',
    reportedAssist: currentSession.crew?.assist || '',
    createdAt: Date.now()
  });
  try { saveData(data); }
  catch (e) { alert('저장 실패: ' + (e.message || e)); return; }

  document.getElementById('complaintModal').remove();
  __cmpMap = null; __cmpMarker = null;
  renderMapForSession();

  const ev = getEvent(data, currentSession.eventId);
  const courseName = assignedCourseId ? (getCourse(data, assignedCourseId)?.name || '') : '미지정';
  const phoneTel = phone ? phone.replace(/[^0-9+]/g, '') : '';
  const phoneStr = phone ? `<a href="tel:${phoneTel}">${phone}</a>` : '-';
  const addrLine = address ? `\n주소: ${address}` : '';
  sendTelegram(`📞 <b>민원 접수</b>\n유형: ${type}\n${ev?.name || ''} · 배정: ${courseName}\n연락처: ${phoneStr}\n내용: ${content || '-'}${addrLine}\n위치: ${lat.toFixed(5)}, ${lng.toFixed(5)}\n접수자: ${tgPersonLink(currentSession.crew?.driver, currentSession.crew?.driverPhone)}${currentSession.crew?.assist ? ' / ' + tgPersonLink(currentSession.crew.assist, currentSession.crew?.assistPhone) : ''}`);
  alert('✅ 민원 접수됨\n관리자가 확인할 수 있습니다.');
}

function resetCourse() {
  if (!confirm('이 코스의 진행 상태를 초기화할까요? (체크/궤적 삭제)')) return;
  if (!currentSession) return;
  currentSession.completions = [];
  currentSession.track = [];
  currentSession.startedAt = Date.now();
  saveSession();
  renderAnchorRows();
  renderMapForSession();
}

// ─── 민원/거점요청 내역 모달 ───
function showHistoryModal(type) {
  const data = loadData();
  const isComplaint = type === 'complaints';
  const title = isComplaint ? '📞 민원 내역' : '📌 거점요청 내역';
  const items = isComplaint
    ? (data.complaints || []).slice().sort((a,b) => (b.createdAt||0) - (a.createdAt||0))
    : (data.requests || []).slice().sort((a,b) => (b.requestedAt||0) - (a.requestedAt||0));

  let listHtml = '';
  if (!items.length) {
    listHtml = '<div style="text-align:center;color:#aaa;padding:20px;">내역이 없습니다</div>';
  } else {
    listHtml = items.map(it => {
      const ts = it.createdAt || it.requestedAt || 0;
      const timeStr = ts ? new Date(ts).toLocaleString('ko-KR', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
      const statusColor = it.status === 'resolved' ? '#27ae60' : it.status === 'approved' ? '#27ae60' : '#e67e22';
      const statusLabel = it.status === 'resolved' ? '처리완료' : it.status === 'approved' ? '승인됨' : '대기중';

      if (isComplaint) {
        const phone = (it.phone || '').trim();
        const phoneTel = phone.replace(/[^0-9+]/g, '');
        const crs = it.courseId ? (getCourse(data, it.courseId) || {}) : null;
        const courseTag = crs ? `<span style="background:${crs.color||'#888'};color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">${(crs.name||'').replace(/</g,'&lt;')}${crs.detail ? ' ('+crs.detail.replace(/</g,'&lt;')+')' : ''}</span>` : '';
        return `
          <div style="padding:10px 0;border-bottom:1px solid #eee;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <span style="background:${statusColor};color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">${statusLabel}</span>
              ${courseTag}
              <span style="font-size:11px;color:#888;">${timeStr}</span>
            </div>
            <div style="font-weight:600;font-size:14px;margin-bottom:2px;">${(it.content || '내용 없음').replace(/</g,'&lt;')}</div>
            ${it.reportedBy ? '<div style="font-size:11px;color:#888;">접수: ' + (it.reportedBy||'').replace(/</g,'&lt;') + '</div>' : ''}
            <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;">
              ${phone ? '<a href="tel:' + phoneTel + '" style="display:inline-flex;align-items:center;gap:4px;background:#3498db;color:#fff;padding:6px 12px;border-radius:6px;font-weight:700;font-size:12px;text-decoration:none;">📞 ' + phone.replace(/</g,'&lt;') + '</a>' : ''}
              ${typeof it.lat === 'number' ? '<a href="https://map.kakao.com/link/to/민원위치,' + it.lat + ',' + it.lng + '" target="_blank" style="display:inline-flex;align-items:center;gap:4px;background:#e74c3c;color:#fff;padding:6px 12px;border-radius:6px;font-weight:700;font-size:12px;text-decoration:none;">🧭 네비</a>' : ''}
            </div>
          </div>`;
      } else {
        return `
          <div style="padding:10px 0;border-bottom:1px solid #eee;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <span style="background:${statusColor};color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">${statusLabel}</span>
              <span style="font-size:11px;color:#888;">${timeStr}</span>
            </div>
            <div style="font-weight:600;font-size:14px;margin-bottom:2px;">${(it.name || '').replace(/</g,'&lt;')}</div>
            ${it.memo ? '<div style="font-size:12px;color:#555;">' + it.memo.replace(/</g,'&lt;') + '</div>' : ''}
            ${it.requestedBy ? '<div style="font-size:11px;color:#888;">요청: ' + (it.requestedBy||'').replace(/</g,'&lt;') + '</div>' : ''}
            <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;">
              ${typeof it.lat === 'number' ? '<a href="https://map.kakao.com/link/to/요청위치,' + it.lat + ',' + it.lng + '" target="_blank" style="display:inline-flex;align-items:center;gap:4px;background:#e74c3c;color:#fff;padding:6px 12px;border-radius:6px;font-weight:700;font-size:12px;text-decoration:none;">🧭 네비</a>' : ''}
            </div>
          </div>`;
      }
    }).join('');
  }

  // 모달 생성
  let modal = document.getElementById('historyModal');
  if (modal) modal.remove();
  modal = document.createElement('div');
  modal.id = 'historyModal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div style="background:#fff;border-radius:12px;width:100%;max-width:480px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #eee;">
        <div style="font-weight:700;font-size:16px;">${title}</div>
        <button onclick="document.getElementById('historyModal').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#888;padding:0 4px;">✕</button>
      </div>
      <div style="overflow-y:auto;padding:0 16px 16px;">${listHtml}</div>
    </div>
  `;
  document.body.appendChild(modal);
}
</script>
</body>
