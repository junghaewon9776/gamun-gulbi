<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>법성포청년회 - 코스 관리 시스템</title>
  <link rel="stylesheet" href="style.css?v=20260611b">
</head>
<body>
<header>
  <h1>📍 코스 관리 시스템</h1>
  <span id="syncStatus" style="font-size:11px;opacity:0.7;">Firebase 연결 중...</span>
</header>

<div class="container">
  <div class="menu-grid">
    <a href="today.html" class="menu-card" style="grid-column:span 2;background:#27ae60;color:#fff;">
      <div class="icon">🚐</div>
      <div class="title">오늘의 운영</div>
      <div class="desc" style="color:#e8f5e9;">방역하기 (현장 기사용 + GPS)</div>
    </a>
    <a href="admin.html" class="menu-card admin-only" style="display:none;">
      <div class="icon">⚙️</div>
      <div class="title">관리자</div>
      <div class="desc">행사·코스·거점·요청 관리</div>
    </a>
    <a href="members.html" class="menu-card admin-only" style="display:none;">
      <div class="icon">👥</div>
      <div class="title">인원관리</div>
      <div class="desc">회원·조 편성·팀짜기</div>
    </a>
    <a href="monitor.html" class="menu-card admin-only" style="display:none;">
      <div class="icon">📊</div>
      <div class="title">본부 모니터링</div>
      <div class="desc">실시간 차량 + 운행기록</div>
    </a>
    <a href="teams.html" class="menu-card" style="grid-column:span 2;background:#3498db;color:#fff;">
      <div class="icon">👥</div>
      <div class="title">조별 현황</div>
      <div class="desc" style="color:#dbeafe;">우리 조 명단·연락처·코스 배정</div>
    </a>
    <a href="inquiry.html" class="menu-card" style="grid-column:span 2;background:#e74c3c;color:#fff;">
      <div class="icon">📋</div>
      <div class="title">회원민원</div>
      <div class="desc" style="color:#fde8e8;">장비·차량·음료·결제 등 민원 접수</div>
    </a>
    <a href="stats.html" class="menu-card">
      <div class="icon">📈</div>
      <div class="title">통계</div>
      <div class="desc">회원별 방역 횟수·차트</div>
    </a>
    <a href="accounts.html" class="menu-card super-only" id="accountsCard" style="display:none;">
      <div class="icon">🔐</div>
      <div class="title">계정관리</div>
      <div class="desc">관리자 계정 추가·권한</div>
    </a>
    <a href="print.html" class="menu-card">
      <div class="icon">🖨</div>
      <div class="title">인쇄용</div>
      <div class="desc">조·코스·QR 한 페이지로</div>
    </a>
  </div>

  <!-- 로그인 안 됐을 때 -->
  <div id="loginPrompt" class="card" style="max-width:600px;margin:0 auto;text-align:center;display:none;">
    <p style="color:#666;font-size:14px;margin:0 0 10px;">간부·회원 로그인하면 더 많은 기능을 사용할 수 있어요</p>
    <button onclick="showLoginGate()" style="background:#2980b9;color:#fff;border:none;padding:12px 32px;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;">🔐 로그인</button>
  </div>

  <!-- 로그인 됐을 때 -->
  <div id="userInfo" class="card" style="max-width:600px;margin:0 auto;display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <span id="userLabel" style="font-size:14px;font-weight:700;"></span>
        <span id="userRole" class="tag" style="font-size:11px;margin-left:6px;"></span>
      </div>
      <div style="display:flex;gap:6px;">
        <button onclick="showSettingsMenu()" style="background:#7f8c8d;color:#fff;border:none;padding:8px 12px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;">⚙️</button>
        <button onclick="doLogout()" style="background:#e74c3c;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;">로그아웃</button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js?v=20260512v"></script>
<script src="common.js?v=20260611a"></script>
<script>
  ensureAnonAuth().then(() => {
    initFirebaseSync();
    onDataReady(() => {
      document.getElementById('syncStatus').textContent = '✅ 연결됨';
      updateLoginUI();
    });
  });

  window.onAuthSuccess = () => {
    const gate = document.getElementById('loginGate');
    if (gate) gate.remove();
    onDataReady(updateLoginUI);
  };

  function updateLoginUI() {
    const role2 = getMyRole();
    const isAdmin = role2 === 'admin' || role2 === 'super';
    document.querySelectorAll('.admin-only').forEach(el => {
      el.style.display = isAdmin ? '' : 'none';
    });
    document.querySelectorAll('.super-only').forEach(el => {
      el.style.display = role2 === 'super' ? '' : 'none';
    });
    const u = fbAuth.currentUser;
    if (u && !u.isAnonymous) {
      const data = loadData();
      const info = (data.users || {})[u.uid];
      const memberId = (data.memberAuth || {})[u.uid];
      const member = memberId ? (data.members || []).find(m => m.id === memberId) : null;
      const name = info?.name || member?.name || u.email;
      const role = info?.role || (member ? '회원' : '');
      document.getElementById('userLabel').textContent = '👤 ' + name;
      const roleEl = document.getElementById('userRole');
      if (role) {
        roleEl.textContent = role;
        roleEl.style.background = role === 'super' ? '#9b59b6' : role === 'admin' ? '#3498db' : '#27ae60';
        roleEl.style.color = '#fff';
      }
      document.getElementById('userInfo').style.display = '';
      document.getElementById('loginPrompt').style.display = 'none';
    } else {
      document.getElementById('userInfo').style.display = 'none';
      document.getElementById('loginPrompt').style.display = '';
    }
  }

  function showSettingsMenu() {
    if (document.getElementById('settingsMenu')) { document.getElementById('settingsMenu').remove(); return; }
    const devName = getDeviceName() || '(미등록)';
    const overlay = document.createElement('div');
    overlay.id = 'settingsMenu';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;padding:20px;';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:14px;padding:24px 20px;max-width:340px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,0.2);">
        <h3 style="margin:0 0 16px;color:#2c3e50;font-size:17px;">⚙️ 설정</h3>
        <div style="margin-bottom:10px;font-size:13px;color:#555;">📱 기기이름: <b>${devName.replace(/</g,'&lt;')}</b></div>
        <button onclick="changeDeviceNamePrompt();document.getElementById('settingsMenu')?.remove();"
          style="width:100%;padding:11px;background:#3498db;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:8px;">📱 기기이름 변경</button>
        <button onclick="changeMyPassword();document.getElementById('settingsMenu')?.remove();"
          style="width:100%;padding:11px;background:#e67e22;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:8px;">🔑 비밀번호 변경</button>
        <button onclick="document.getElementById('settingsMenu').remove();"
          style="width:100%;padding:11px;background:#ecf0f1;color:#7f8c8d;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;">닫기</button>
      </div>
    `;
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
  }

  function doLogout() {
    if (!confirm('로그아웃 하시겠습니까?')) return;
    _signingOut = true;
    stopFirebaseSync();
    fbAuth.signOut().then(() => {
      return fbAuth.signInAnonymously();
    }).then(() => {
      location.reload();
    }).catch(() => {
      location.reload();
    });
  }
</script>
</body>
</html>
