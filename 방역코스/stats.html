<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>통계 - 방역 횟수</title>
  <link rel="stylesheet" href="style.css?v=20260611b">
  <style>
    table { width:100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 6px 8px; border: 1px solid #ddd; text-align: center; }
    th { background: #34495e; color: #fff; position: sticky; top: 0; }
    td:first-child { text-align: left; font-weight: 600; background: #f8f9fa; white-space: nowrap; }
    th:first-child { white-space: nowrap; }
    tr:hover td { background: #fffde7; }
    .num-zero { color: #ccc; }
    .num-high { background: #c8e6c9; font-weight: 700; }
    .scroll-x { overflow-x: auto; max-height: 600px; }
  </style>
</head>
<body>
<header>
  <h1>📈 통계 - 방역 횟수</h1>
  <nav>
    <a href="index.html">홈</a>
    <a href="admin.html">관리</a>
    <a href="members.html">인원</a>
    <a href="today.html">오늘운영</a>
    <a href="monitor.html">모니터링</a>
    <a href="stats.html" class="active">통계</a>
    <a href="accounts.html" class="super-nav" style="display:none;">계정</a>
    <a href="#" onclick="adminLogout();return false;">로그아웃</a>
  </nav>
</header>

<div class="container">
  <div class="card">
    <div class="flex-between" style="flex-wrap:wrap;gap:8px;">
      <h2>필터</h2>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <label style="display:inline;font-size:12px;">행사:</label>
        <select id="eventFilter" onchange="render()" style="width:auto;display:inline-block;">
          <option value="">전체</option>
        </select>
        <label style="display:inline;font-size:12px;">기간:</label>
        <select id="period" onchange="onPeriodChange()" style="width:auto;display:inline-block;">
          <option value="all">전체</option>
          <option value="month">최근 30일</option>
          <option value="week">최근 7일</option>
          <option value="today">오늘</option>
          <option value="day">일별 선택</option>
          <option value="monthly">월별 선택</option>
          <option value="range">기간 선택</option>
        </select>
        <span id="dayPicker" style="display:none;">
          <input type="date" id="dayInput" onchange="render()" style="width:auto;display:inline-block;">
        </span>
        <span id="monthPicker" style="display:none;">
          <input type="month" id="monthInput" onchange="render()" style="width:auto;display:inline-block;">
        </span>
        <span id="rangePicker" style="display:none;">
          <input type="date" id="rangeStart" onchange="render()" style="width:auto;display:inline-block;">
          ~
          <input type="date" id="rangeEnd" onchange="render()" style="width:auto;display:inline-block;">
        </span>
        <button class="small" onclick="exportStatsCSV()">⬇️ 엑셀</button>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px;">
    <label style="font-size:12px;">그룹:</label>
    <select id="memberGroupBy" onchange="render()" style="width:auto;display:inline-block;">
      <option value="member" selected>회원 전체</option>
      <option value="driver">운전자만</option>
      <option value="assist">보조자만</option>
      <option value="team">조별</option>
    </select>
    <label style="font-size:12px;margin-left:8px;">상세:</label>
    <button id="detailToggle" class="small" onclick="toggleDetail()" style="font-size:12px;">상세 켜기</button>
    <span style="font-size:11px;color:#888;margin-left:8px;">💰 단가는 행사별로 설정</span>
  </div>

  <div id="statsContainer"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js?v=20260512v"></script>
<script src="common.js?v=20260611a"></script>
<script>
let __charts = []; // 동적 차트 인스턴스 추적

window.onAuthSuccess = () => onDataReady(render);
window.onDataChanged = () => render();
checkAdminAuth().then(ok => { if (ok) onDataReady(render); });

// 관리자 👁 토글로 숨긴 행사는 통계에서도 제외
function isEventVisibleForViewer(eventId, data) {
  if (!data) data = loadData();
  const v = (data.visibility || {}).events || {};
  return v[eventId] !== false;
}

function renderEventFilterOptions() {
  const sel = document.getElementById('eventFilter');
  if (!sel) return;
  const data = loadData();
  const cur = sel.value;
  const visible = (data.events || []).filter(e => isEventVisibleForViewer(e.id, data));
  sel.innerHTML = '<option value="">전체</option>' +
    visible.map(e => `<option value="${e.id}"${cur===e.id?' selected':''}>${e.name}</option>`).join('');
}

let __showDetail = false;
function toggleDetail() {
  __showDetail = !__showDetail;
  const btn = document.getElementById('detailToggle');
  btn.textContent = __showDetail ? '상세 끄기' : '상세 켜기';
  btn.className = __showDetail ? 'small success' : 'small';
  render();
}
function detailSuffix(c) {
  return (__showDetail && c.detail) ? ' (' + c.detail + ')' : '';
}

function saveEventUnitPrice(eventId, val) {
  const data = loadData();
  const ev = (data.events || []).find(e => e.id === eventId);
  if (!ev) return;
  const num = parseInt(val);
  if (isNaN(num) || num < 0) { ev.unitPrice = null; }
  else { ev.unitPrice = num; }
  saveData(data);
  render();
}

function onPeriodChange() {
  const period = document.getElementById('period').value;
  document.getElementById('dayPicker').style.display = period === 'day' ? 'inline-block' : 'none';
  document.getElementById('monthPicker').style.display = period === 'monthly' ? 'inline-block' : 'none';
  document.getElementById('rangePicker').style.display = period === 'range' ? 'inline-block' : 'none';
  if (period === 'day' && !document.getElementById('dayInput').value) {
    document.getElementById('dayInput').value = todayStr();
  } else if (period === 'monthly' && !document.getElementById('monthInput').value) {
    document.getElementById('monthInput').value = todayStr().slice(0, 7);
  } else if (period === 'range') {
    if (!document.getElementById('rangeStart').value) document.getElementById('rangeStart').value = todayStr();
    if (!document.getElementById('rangeEnd').value) document.getElementById('rangeEnd').value = todayStr();
  }
  render();
}

function getFilteredLogs() {
  const data = loadData();
  const period = document.getElementById('period').value;
  const now = Date.now();
  let from = 0, to = Infinity;
  if (period === 'today') {
    const d = new Date(); d.setHours(0,0,0,0);
    from = d.getTime();
  } else if (period === 'week') from = now - 7*24*60*60*1000;
  else if (period === 'month') from = now - 30*24*60*60*1000;
  else if (period === 'day') {
    const v = document.getElementById('dayInput').value;
    if (v) {
      const d = new Date(v + 'T00:00:00');
      from = d.getTime();
      to = from + 24*60*60*1000;
    }
  } else if (period === 'monthly') {
    const v = document.getElementById('monthInput').value;
    if (v) {
      const [y, m] = v.split('-').map(Number);
      from = new Date(y, m-1, 1).getTime();
      to = new Date(y, m, 1).getTime();
    }
  } else if (period === 'range') {
    const s = document.getElementById('rangeStart').value;
    const e = document.getElementById('rangeEnd').value;
    if (s) from = new Date(s + 'T00:00:00').getTime();
    if (e) to = new Date(e + 'T23:59:59').getTime();
  }
  const eventFilter = document.getElementById('eventFilter')?.value || '';
  return (data.logs || []).filter(l => {
    if (l.hidden) return false;
    const t = l.startedAt || 0;
    if (t < from || t > to) return false;
    if (!l.finishedAt) return false;
    if (eventFilter && l.eventId !== eventFilter) return false;
    if (!isEventVisibleForViewer(l.eventId, data)) return false;
    return true;
  });
}


// 한 로그에서 그룹 키 뽑아내기 (groupBy에 따라)
function logGroupKeys(log, groupBy, data) {
  const keys = [];
  if (groupBy === 'member') {
    if (log.crew?.driver) keys.push(log.crew.driver.trim());
    if (log.crew?.assist) {
      log.crew.assist.split(',').map(s => s.trim()).filter(Boolean).forEach(n => keys.push(n));
    }
  } else if (groupBy === 'driver') {
    if (log.crew?.driver) keys.push(log.crew.driver.trim());
  } else if (groupBy === 'assist') {
    if (log.crew?.assist) {
      log.crew.assist.split(',').map(s => s.trim()).filter(Boolean).forEach(n => keys.push(n));
    }
  } else if (groupBy === 'team') {
    const team = getTeam(data, log.teamId);
    if (team) keys.push(team.name);
  }
  return keys;
}

const GROUP_LABELS = {
  member: { row: '회원', title: '회원별 방역 횟수 (코스별 누적)' },
  driver: { row: '운전자', title: '운전자별 방역 횟수 (코스별 누적)' },
  assist: { row: '보조자', title: '보조자별 방역 횟수 (코스별 누적)' },
  team:   { row: '조',   title: '조별 방역 횟수 (코스별 누적)' }
};

function render() {
  renderEventFilterOptions();
  const data = loadData();
  const allLogs = getFilteredLogs();
  const members = data.members || [];
  const groupBy = document.getElementById('memberGroupBy')?.value || 'member';
  const labels = GROUP_LABELS[groupBy] || GROUP_LABELS.member;
  const eventFilter = document.getElementById('eventFilter')?.value || '';

  // 이전 차트 정리
  __charts.forEach(c => c.destroy());
  __charts = [];

  // 표시할 행사 목록
  const visibleEvents = (data.events || []).filter(e => {
    if (!isEventVisibleForViewer(e.id, data)) return false;
    if (eventFilter && e.id !== eventFilter) return false;
    return true;
  });

  const container = document.getElementById('statsContainer');
  container.innerHTML = '';

  visibleEvents.forEach(event => {
    const courses = (event.courses || []).map(c => ({ id: c.id, label: c.name, detail: c.detail || '', color: c.color }));
    if (!courses.length) return;
    const logs = allLogs.filter(l => l.eventId === event.id);

    // 집계
    const matrix = {}, memberTotals = {}, courseTotals = {};
    for (const log of logs) {
      const courseId = log.courseId;
      for (const name of logGroupKeys(log, groupBy, data)) {
        if (!matrix[name]) matrix[name] = {};
        matrix[name][courseId] = (matrix[name][courseId] || 0) + 1;
        memberTotals[name] = (memberTotals[name] || 0) + 1;
      }
      courseTotals[courseId] = (courseTotals[courseId] || 0) + 1;
    }

    const uid = 'ev_' + event.id.replace(/[^a-zA-Z0-9]/g,'');

    // 섹션 HTML
    const section = document.createElement('div');
    section.innerHTML = `
      <div class="card" style="border-left:4px solid #2c3e50;margin-bottom:6px;">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">
          <h2 style="font-size:16px;margin:0;">📋 ${event.name}</h2>
          <div style="display:flex;align-items:center;gap:4px;">
            <label style="font-size:12px;font-weight:600;color:#555;">💰 단가:</label>
            <input type="number" id="up_${uid}" value="${event.unitPrice ?? ''}" min="0" step="1000"
              placeholder="미설정" style="width:90px;font-size:12px;padding:4px 6px;"
              onchange="saveEventUnitPrice('${event.id}', this.value)">
            <span style="font-size:11px;color:#888;">원</span>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>📅 일자별 운행 기록</h2>
        <div class="scroll-x"><table id="daily_${uid}"></table></div>
      </div>
      <div class="row">
        <div class="col" style="flex:1;min-width:320px;">
          <div class="card">
            <h2>${labels.title}</h2>
            <div id="mcScroll_${uid}" style="max-height:500px;overflow-y:auto;">
              <div id="mcWrap_${uid}" style="position:relative;"><canvas id="mc_${uid}"></canvas></div>
            </div>
          </div>
        </div>
        <div class="col" style="flex:1;min-width:320px;">
          <div class="card">
            <h2>코스별 방역 총 횟수</h2>
            <canvas id="cc_${uid}" style="max-height:400px;"></canvas>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>회원 × 코스 누적</h2>
        <div class="scroll-x"><table id="tb_${uid}"></table></div>
      </div>
    `;
    container.appendChild(section);

    // 단가 (행사별 저장값)
    const hasUnitPrice = event.unitPrice != null && event.unitPrice !== '';
    const unitPrice = hasUnitPrice ? (parseInt(event.unitPrice) || 0) : 0;
    const fmtWon = v => (v != null) ? '₩' + v.toLocaleString() : '';

    // ── 일자별 운행 기록 표 ──
    const sortedLogs = [...logs].sort((a,b) => (b.startedAt||0) - (a.startedAt||0));
    const courseColTotals = {};
    courses.forEach(c => { courseColTotals[c.id] = 0; });

    const S = 'font-size:11px;padding:2px 4px;white-space:nowrap;';  // 작고 한 줄
    const hhmm = ts => { if (!ts) return '-'; const t = new Date(ts); return `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`; };
    const timeHead = __showDetail ? `<th style="${S}">시작</th><th style="${S}">종료</th><th style="${S}">소요</th>` : '';
    let dHead = `<tr><th style="${S}">일자</th><th style="${S}">방역자</th><th style="${S}">보조자</th><th style="${S}">조</th>${timeHead}` + courses.map(c =>
      `<th style="${S}background:${c.color};color:#fff;">${c.label}${__showDetail && c.detail ? ' ('+c.detail+')' : ''}</th>`
    ).join('') + `<th style="${S}">총계</th></tr>`;
    let dBody = '';
    for (const log of sortedLogs) {
      const d = new Date(log.startedAt || 0);
      const dayNames = ['일','월','화','수','목','금','토'];
      const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}(${dayNames[d.getDay()]})`;
      const driver = log.crew?.driver || '-';
      const assist = log.crew?.assist || '-';
      let team = '-';
      if (log.teamId) {
        team = getTeam(data, log.teamId)?.name || '-';
      } else if (driver !== '-') {
        const driverMember = (data.members || []).find(m => (m.name||'').trim() === driver.trim());
        if (driverMember) {
          const found = (data.teams || []).find(t =>
            t.leaderId === driverMember.id || t.viceLeaderId === driverMember.id || (t.memberIds || []).includes(driverMember.id)
          );
          if (found) team = found.name;
        }
      }
      let timeCells = '';
      if (__showDetail) {
        const startStr = hhmm(log.startedAt);
        const endStr = hhmm(log.finishedAt);
        const durStr = (log.startedAt && log.finishedAt) ? Math.round((log.finishedAt - log.startedAt) / 60000) + '분' : '-';
        timeCells = `<td style="${S}text-align:center;color:#27ae60;">${startStr}</td><td style="${S}text-align:center;color:#c0392b;">${endStr}</td><td style="${S}text-align:center;color:#666;">${durStr}</td>`;
      }
      let row = `<tr><td style="${S}">${dateStr}</td><td style="${S}">${driver}</td><td style="${S}">${assist}</td><td style="${S}">${team}</td>${timeCells}`;
      let rowTotal = 0;
      for (const c of courses) {
        if (log.courseId === c.id) {
          row += `<td style="${S}background:${c.color}22;font-weight:700;text-align:center;">1</td>`;
          courseColTotals[c.id]++;
          rowTotal++;
        } else {
          row += `<td style="${S}"></td>`;
        }
      }
      row += `<td style="${S}font-weight:700;text-align:center;">${rowTotal}</td>`;
      dBody += row + '</tr>';
    }
    // 합계 행
    const grandTotal = Object.values(courseColTotals).reduce((s,v) => s+v, 0);
    let dFoot = `<tr style="background:#f0f0f0;font-weight:700;">
      <td colspan="${__showDetail ? 7 : 4}" style="${S}text-align:center;">합계</td>`;
    for (const c of courses) {
      dFoot += `<td style="${S}text-align:center;">${courseColTotals[c.id]}</td>`;
    }
    dFoot += `<td style="${S}text-align:center;">${grandTotal}</td></tr>`;
    document.getElementById('daily_' + uid).innerHTML = dHead + (dBody || '<tr><td colspan="99" class="empty">기록 없음</td></tr>') + dFoot;

    // ── 회원 × 코스 표 (금액 포함) ──
    const sortedAll = Object.entries(memberTotals).sort((a,b) => b[1]-a[1]);
    let thead = `<tr><th>${labels.row}</th>` + courses.map(c => `<th>${c.label}${__showDetail && c.detail ? '<br><span style="font-weight:400;font-size:10px;opacity:.7;">('+c.detail+')</span>' : ''}</th>`).join('') + '<th>총합</th>' + (hasUnitPrice ? '<th>금액</th>' : '') + '</tr>';
    let tbody = '';
    let allTotal = 0;
    for (const [name, total] of sortedAll) {
      if (total === 0) continue;
      allTotal += total;
      const isUnregistered = groupBy === 'member' && !members.find(m=>m.name===name);
      let row = `<tr><td>${name}${isUnregistered ? ' <span class="sub">(미등록)</span>' : ''}</td>`;
      for (const c of courses) {
        const v = matrix[name]?.[c.id] || 0;
        row += `<td class="${v===0?'num-zero':v>=3?'num-high':''}">${v||''}</td>`;
      }
      row += `<td><b>${total}</b></td>`;
      if (hasUnitPrice) row += `<td style="white-space:nowrap;color:#2c3e50;font-weight:600;">${fmtWon(total * unitPrice)}</td>`;
      tbody += row + '</tr>';
    }
    // 합계 행
    let tfoot = `<tr style="background:#f0f0f0;font-weight:700;"><td>합계</td>`;
    for (const c of courses) {
      tfoot += `<td style="text-align:center;">${courseTotals[c.id] || 0}</td>`;
    }
    tfoot += `<td><b>${allTotal}</b></td>`;
    if (hasUnitPrice) tfoot += `<td style="white-space:nowrap;color:#c0392b;">${fmtWon(allTotal * unitPrice)}</td>`;
    tfoot += '</tr>';
    document.getElementById('tb_' + uid).innerHTML = thead + tbody + tfoot;

    // 회원별 누적 막대 — 8명 초과 시 가로 막대 + 스크롤
    const sortedNames = sortedAll.map(x => x[0]);
    const useHorizontal = sortedNames.length > 8;
    const mcWrap = document.getElementById('mcWrap_' + uid);
    mcWrap.style.height = useHorizontal ? Math.max(300, sortedNames.length * 36) + 'px' : '400px';
    const mc = new Chart(document.getElementById('mc_' + uid), {
      type: 'bar',
      data: {
        labels: sortedNames,
        datasets: courses.map(c => ({
          label: c.label + detailSuffix(c),
          data: sortedNames.map(n => matrix[n]?.[c.id] || 0),
          backgroundColor: c.color
        }))
      },
      options: {
        indexAxis: useHorizontal ? 'y' : 'x',
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'bottom', labels: { font: { size: 10 } } },
          tooltip: { mode: 'index', intersect: false }
        },
        scales: useHorizontal ? {
          x: { stacked: true, beginAtZero: true, ticks: { precision: 0 } },
          y: { stacked: true, ticks: { font: { size: 11 }, autoSkip: false } }
        } : {
          x: { stacked: true, ticks: { font: { size: 10 }, maxRotation: 45 } },
          y: { stacked: true, beginAtZero: true, ticks: { precision: 0 } }
        },
        layout: { padding: { top: useHorizontal ? 4 : 24, right: useHorizontal ? 32 : 0 } }
      },
      plugins: useHorizontal ? [] : [stackTotalsPlugin]
    });
    __charts.push(mc);

    // 코스별 막대
    const cc = new Chart(document.getElementById('cc_' + uid), {
      type: 'bar',
      data: {
        labels: courses.map(c => c.label + detailSuffix(c)),
        datasets: [{ label: '방역 횟수', data: courses.map(c => courseTotals[c.id] || 0), backgroundColor: courses.map(c => c.color) }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { ticks: { precision: 0 } }, y: { beginAtZero: true, ticks: { precision: 0 } } }
      }
    });
    __charts.push(cc);
  });

  if (!container.children.length) {
    container.innerHTML = '<div class="card empty">표시할 데이터가 없습니다</div>';
  }
}

// 누적 막대: 각 세그먼트 안에 코스별 개수 + 막대 위에 총합
const stackTotalsPlugin = {
  id: 'stackTotals',
  afterDatasetsDraw(chart) {
    const { ctx, data } = chart;
    if (!data.datasets.length) return;

    // 1) 각 세그먼트 안에 개수 표시 (흰색)
    data.datasets.forEach((ds, dsIdx) => {
      const meta = chart.getDatasetMeta(dsIdx);
      meta.data.forEach((bar, i) => {
        const v = ds.data[i] || 0;
        if (v === 0) return;
        const top = bar.y;
        const bottom = bar.base;
        const h = Math.abs(bottom - top);
        if (h < 14) return; // 너무 좁으면 생략
        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(v, bar.x, (top + bottom) / 2);
        ctx.restore();
      });
    });

    // 2) 막대 꼭대기 위에 총합 표시
    const lastMeta = chart.getDatasetMeta(data.datasets.length - 1);
    lastMeta.data.forEach((bar, i) => {
      let total = 0;
      data.datasets.forEach(ds => { total += (ds.data[i] || 0); });
      if (total === 0) return;
      ctx.save();
      ctx.fillStyle = '#222';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(total, bar.x, bar.y - 4);
      ctx.restore();
    });
  }
};

function exportStatsCSV() {
  let csv = '﻿';
  const tables = document.querySelectorAll('#statsContainer table');
  const headers = document.querySelectorAll('#statsContainer .card h2');
  let hIdx = 0;
  tables.forEach(table => {
    // 행사 제목 찾기 (table 앞의 📋 헤더)
    const section = table.closest('.card');
    const prevCards = section?.parentElement?.querySelectorAll('.card');
    csv += '\n';
    // 행사명 헤더 삽입
    const titleCard = table.closest('div')?.parentElement?.parentElement?.querySelector('h2');
    if (titleCard) csv += `"${titleCard.textContent.replace(/"/g,'""')}"\n`;
    for (const row of table.rows) {
      csv += [...row.cells].map(c => `"${c.textContent.replace(/"/g, '""')}"`).join(',') + '\n';
    }
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `방역통계-${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
